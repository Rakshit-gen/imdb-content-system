version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    command: gunicorn -w 4 -b 0.0.0.0:5000 --timeout 300 wsgi:app
    ports:
      - "5001:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
      - shared_tmp:/tmp/uploads

  worker:
    build: .
    command: celery -A app.services.celery_tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./:/app
      - shared_tmp:/tmp/uploads

volumes:
  mongo_data:
  shared_tmp:
